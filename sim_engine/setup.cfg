[develop]
script_dir=$base/lib/sim_engine
[install]
install_scripts=$base/lib/sim_engine

[tool:pytest]
testpaths = test
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Pure Python unit tests (no ROS2 nodes)
    integration: Integration tests (requires ROS2 runtime)
