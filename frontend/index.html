<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUCIBLE</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Toolbar -->
        <header id="toolbar">
            <span class="toolbar-brand">CRUCIBLE</span>
            <div class="toolbar-sep"></div>

            <div class="toolbar-group">
                <button class="btn btn-icon" id="btn-play" title="Play">&#9654;</button>
                <button class="btn btn-icon" id="btn-pause" title="Pause">&#9646;&#9646;</button>
                <button class="btn btn-icon" id="btn-step" title="Step">&#9654;|</button>
                <button class="btn btn-icon" id="btn-reset" title="Reset">&#8634;</button>
                <select class="form-input" id="speed-select" style="width: 70px;">
                    <option value="0.1">0.1x</option>
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="5">5x</option>
                    <option value="10">10x</option>
                    <option value="0">Max</option>
                </select>
            </div>

            <div class="toolbar-sep"></div>

            <div class="toolbar-group">
                <button class="btn" id="btn-add-agent">+ Agent</button>
                <div class="split-btn" id="place-split-btn">
                    <button class="btn split-btn-main" id="btn-place-agent">
                        <span class="place-icon" id="place-icon"></span>
                        <span id="place-label">Place UxV</span>
                    </button>
                    <button class="btn split-btn-arrow" id="btn-place-dropdown">&#9662;</button>
                    <div class="split-btn-menu" id="place-menu">
                        <div class="split-btn-item" data-type="uxv">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="12" y1="2" x2="12" y2="8" stroke="currentColor" stroke-width="1.2"/><line x1="12" y1="16" x2="12" y2="22" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="12" x2="8" y2="12" stroke="currentColor" stroke-width="1.2"/><line x1="16" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.2"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
                            UxV
                        </div>
                        <div class="split-btn-item" data-type="uav">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="12" y1="9" x2="6" y2="3" stroke="currentColor" stroke-width="1.2"/><line x1="12" y1="9" x2="18" y2="3" stroke="currentColor" stroke-width="1.2"/><line x1="12" y1="15" x2="6" y2="21" stroke="currentColor" stroke-width="1.2"/><line x1="12" y1="15" x2="18" y2="21" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="3" r="2" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="18" cy="3" r="2" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="21" r="2" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="18" cy="21" r="2" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
                            UAV
                        </div>
                        <div class="split-btn-item" data-type="usv">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><path d="M3 15 C6 11, 10 11, 12 13 C14 15, 18 15, 21 11" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M5 14 L7 7 L12 5 L17 7 L19 14" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="12" y1="5" x2="12" y2="2" stroke="currentColor" stroke-width="1.2"/></svg>
                            USV
                        </div>
                        <div class="split-btn-item" data-type="ugv">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><rect x="4" y="7" width="16" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="7.5" cy="17" r="2.5" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="16.5" cy="17" r="2.5" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="7.5" y1="14" x2="7.5" y2="14.5" stroke="currentColor" stroke-width="1.2"/><line x1="16.5" y1="14" x2="16.5" y2="14.5" stroke="currentColor" stroke-width="1.2"/><path d="M6 7 L8 4 L16 4 L18 7" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
                            UGV
                        </div>
                        <div class="split-btn-item" data-type="uuv">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><ellipse cx="11" cy="12" rx="9" ry="4.5" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M20 9 L22 7 L22 17 L20 15" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="12" r="1" fill="currentColor"/><line x1="11" y1="7.5" x2="11" y2="5" stroke="currentColor" stroke-width="1.2"/><rect x="9.5" y="4" width="3" height="2" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
                            UUV
                        </div>
                    </div>
                </div>
            </div>

            <div class="toolbar-sep"></div>

            <div class="toolbar-group">
                <button class="btn" id="btn-load-config">Load</button>
                <button class="btn" id="btn-save-config">Save</button>
            </div>

            <div class="toolbar-spacer"></div>

            <div class="toolbar-group">
                <span class="status-item">
                    <span class="status-dot" id="ws-status"></span>
                    <span id="ws-status-text">Disconnected</span>
                </span>
            </div>
        </header>

        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-header" id="agents-header">
                    <span>Agents <span class="count" id="agent-count">0</span></span>
                    <span class="sort-group">
                        <select class="sort-select" id="agent-sort">
                            <option value="id">By ID</option>
                            <option value="type">By Type</option>
                            <option value="altitude">By Alt/Depth</option>
                        </select>
                        <button class="sort-dir-btn" id="sort-dir-btn" title="Toggle sort direction">&#9650;</button>
                    </span>
                </div>
            </div>
            <div id="agent-list"></div>
        </aside>

        <!-- Map -->
        <main id="map-container">
            <!-- Agent detail panel (floating over map, snapped to sidebar) -->
            <div id="detail-panel">
                <button class="detail-close" id="detail-close">&times;</button>
                <!-- Populated dynamically when agent is selected -->
            </div>
            <div id="map"></div>

            <div class="place-mode-banner" id="place-banner">
                Click map to place agent — ESC to cancel
            </div>
            <div class="adjust-mode-banner" id="adjust-banner"></div>

            <div class="map-overlay">
                <button class="btn btn-sm" id="btn-fit-agents" title="Fit all agents">&#9635;</button>
            </div>

            <div class="map-filter" id="map-filter">
                <label class="filter-item"><input type="checkbox" data-type="uav" checked><span class="filter-swatch" style="background:var(--color-uav)"></span>Air</label>
                <label class="filter-item"><input type="checkbox" data-type="usv" checked><span class="filter-swatch" style="background:var(--color-usv)"></span>Surface</label>
                <label class="filter-item"><input type="checkbox" data-type="ugv" checked><span class="filter-swatch" style="background:var(--color-ugv)"></span>Ground</label>
                <label class="filter-item"><input type="checkbox" data-type="uuv" checked><span class="filter-swatch" style="background:var(--color-uuv)"></span>Underwater</label>
                <label class="filter-item"><input type="checkbox" data-type="uxv" checked><span class="filter-swatch" style="background:var(--color-uxv)"></span>Other</label>
            </div>

            <div class="hotkey-overlay" id="hotkey-overlay"></div>
            <div id="accuracy-panel"></div>
        </main>

        <!-- Status bar -->
        <footer id="status-bar">
            <div class="status-bar-left">
                <span class="sim-status-badge ready" id="sim-status-badge">READY</span>
                <span id="sim-time">T: 0.000s</span>
                <span class="dt-control">
                    <label for="sim-dt-input">dt:</label>
                    <input type="number" id="sim-dt-input" class="dt-input" value="0.01" step="0.001" min="0.001">
                    <span class="dt-unit">s</span>
                </span>
            </div>
            <span id="agent-summary">0 agents | 0 sensors</span>
        </footer>
    </div>

    <!-- Config modal -->
    <div class="modal-overlay" id="config-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">Load Configuration</span>
                <button class="btn btn-sm" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <textarea class="config-editor" id="config-editor"
                    placeholder="Paste YAML configuration here..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn" id="modal-cancel">Cancel</button>
                <button class="btn btn-accent" id="modal-confirm">Apply</button>
            </div>
        </div>
    </div>

    <!-- Add agent modal -->
    <div class="modal-overlay" id="add-agent-modal">
        <div class="modal" style="width: 420px;">
            <div class="modal-header">
                <span class="modal-title">Add Agent</span>
                <button class="btn btn-sm" id="add-agent-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <label class="form-label">Vehicle Type</label>
                    <select class="form-input" id="new-agent-type">
                        <option value="uxv">UxV (Generic)</option>
                        <option value="uav">UAV</option>
                        <option value="usv">USV</option>
                        <option value="ugv">UGV</option>
                        <option value="uuv">UUV</option>
                    </select>
                </div>
                <div class="form-row">
                    <label class="form-label">Vehicle Class</label>
                    <input class="form-input" id="new-agent-class" placeholder="e.g. quadrotor, fixed_wing">
                </div>
                <div class="form-row">
                    <label class="form-label">Agent ID</label>
                    <input class="form-input" id="new-agent-id" placeholder="uav_01">
                </div>
                <div class="form-row">
                    <label class="form-label">Latitude</label>
                    <input class="form-input" id="new-agent-lat" type="number" step="any" value="38.9072">
                </div>
                <div class="form-row">
                    <label class="form-label">Longitude</label>
                    <input class="form-input" id="new-agent-lon" type="number" step="any" value="-77.0369">
                </div>
                <div class="form-row">
                    <label class="form-label">Altitude</label>
                    <input class="form-input" id="new-agent-alt" type="number" step="any" value="100">
                </div>
                <div class="form-row">
                    <label class="form-label">Heading</label>
                    <input class="form-input" id="new-agent-heading" type="number" step="any" value="0">
                </div>
                <div class="form-row">
                    <label class="form-label">Domain ID</label>
                    <input class="form-input" id="new-agent-domain" type="number" value="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" id="add-agent-cancel">Cancel</button>
                <button class="btn btn-accent" id="add-agent-confirm">Add</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/icons.js"></script>
    <script src="js/ws.js"></script>
    <script src="js/map.js"></script>
    <script src="js/agents.js"></script>
    <script src="js/sensors.js"></script>
    <script src="js/accuracy.js"></script>
    <script src="js/scenario.js"></script>
    <script src="js/orchestrator.js"></script>
    <script src="js/sim_control.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
