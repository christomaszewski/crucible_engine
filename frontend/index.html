<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUCIBLE</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Toolbar -->
        <header id="toolbar">
            <span class="toolbar-brand">CRUCIBLE</span>
            <div class="toolbar-sep"></div>

            <div class="toolbar-group">
                <button class="btn btn-icon" id="btn-play" title="Play">&#9654;</button>
                <button class="btn btn-icon" id="btn-pause" title="Pause">&#9646;&#9646;</button>
                <button class="btn btn-icon" id="btn-step" title="Step">&#9654;|</button>
                <select class="form-input" id="speed-select" style="width: 70px;">
                    <option value="0.1">0.1x</option>
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="5">5x</option>
                    <option value="10">10x</option>
                    <option value="0">Max</option>
                </select>
            </div>

            <div class="toolbar-sep"></div>

            <div class="toolbar-group">
                <button class="btn" id="btn-add-agent">+ Agent</button>
                <div class="split-btn" id="place-split-btn">
                    <button class="btn split-btn-main" id="btn-place-agent">
                        <span class="place-icon" id="place-icon"></span>
                        <span id="place-label">Place UxV</span>
                    </button>
                    <button class="btn split-btn-arrow" id="btn-place-dropdown">&#9662;</button>
                    <div class="split-btn-menu" id="place-menu">
                        <div class="split-btn-item" data-type="uxv">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
                            UxV
                        </div>
                        <div class="split-btn-item" data-type="uav">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><path d="M12 6l-6 4h4v4H6l6 4 6-4h-4v-4h4z" fill="currentColor"/></svg>
                            UAV
                        </div>
                        <div class="split-btn-item" data-type="usv">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><path d="M4 14c2-2 4 0 6-2s4 0 6-2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 14v-4l4-3 4 3v4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                            USV
                        </div>
                        <div class="split-btn-item" data-type="ugv">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><rect x="5" y="8" width="14" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="16" r="2" fill="currentColor"/><circle cx="16" cy="16" r="2" fill="currentColor"/></svg>
                            UGV
                        </div>
                        <div class="split-btn-item" data-type="uuv">
                            <svg class="vehicle-icon" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="8" ry="4" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="12" x2="22" y2="10" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="12" r="1" fill="currentColor"/></svg>
                            UUV
                        </div>
                    </div>
                </div>
            </div>

            <div class="toolbar-sep"></div>

            <div class="toolbar-group">
                <button class="btn" id="btn-load-config">Load</button>
                <button class="btn" id="btn-save-config">Save</button>
            </div>

            <div class="toolbar-spacer"></div>

            <div class="toolbar-group">
                <span class="status-item">
                    <span class="status-dot" id="ws-status"></span>
                    <span id="ws-status-text">Disconnected</span>
                </span>
            </div>
        </header>

        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-header" id="agents-header">
                    <span>Agents <span class="count" id="agent-count">0</span></span>
                </div>
            </div>
            <div id="agent-list"></div>

            <div id="detail-panel">
                <!-- Populated dynamically when agent is selected -->
            </div>
        </aside>

        <!-- Map -->
        <main id="map-container">
            <div id="map"></div>

            <div class="place-mode-banner" id="place-banner">
                Click map to place agent — ESC to cancel
            </div>

            <div class="map-overlay">
                <button class="btn btn-sm" id="btn-fit-agents" title="Fit all agents">&#9635;</button>
            </div>

            <div id="accuracy-panel"></div>
        </main>

        <!-- Status bar -->
        <footer id="status-bar">
            <span id="sim-time">T: 0.000s</span>
            <span id="agent-summary">0 agents | 0 sensors</span>
        </footer>
    </div>

    <!-- Config modal -->
    <div class="modal-overlay" id="config-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">Load Configuration</span>
                <button class="btn btn-sm" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <textarea class="config-editor" id="config-editor"
                    placeholder="Paste YAML configuration here..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn" id="modal-cancel">Cancel</button>
                <button class="btn btn-accent" id="modal-confirm">Apply</button>
            </div>
        </div>
    </div>

    <!-- Add agent modal -->
    <div class="modal-overlay" id="add-agent-modal">
        <div class="modal" style="width: 420px;">
            <div class="modal-header">
                <span class="modal-title">Add Agent</span>
                <button class="btn btn-sm" id="add-agent-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <label class="form-label">Vehicle Type</label>
                    <select class="form-input" id="new-agent-type">
                        <option value="uxv">UxV (Generic)</option>
                        <option value="uav">UAV</option>
                        <option value="usv">USV</option>
                        <option value="ugv">UGV</option>
                        <option value="uuv">UUV</option>
                    </select>
                </div>
                <div class="form-row">
                    <label class="form-label">Vehicle Class</label>
                    <input class="form-input" id="new-agent-class" placeholder="e.g. quadrotor, fixed_wing">
                </div>
                <div class="form-row">
                    <label class="form-label">Agent ID</label>
                    <input class="form-input" id="new-agent-id" placeholder="uav_01">
                </div>
                <div class="form-row">
                    <label class="form-label">Latitude</label>
                    <input class="form-input" id="new-agent-lat" type="number" step="any" value="38.9072">
                </div>
                <div class="form-row">
                    <label class="form-label">Longitude</label>
                    <input class="form-input" id="new-agent-lon" type="number" step="any" value="-77.0369">
                </div>
                <div class="form-row">
                    <label class="form-label">Altitude</label>
                    <input class="form-input" id="new-agent-alt" type="number" step="any" value="100">
                </div>
                <div class="form-row">
                    <label class="form-label">Heading</label>
                    <input class="form-input" id="new-agent-heading" type="number" step="any" value="0">
                </div>
                <div class="form-row">
                    <label class="form-label">Domain ID</label>
                    <input class="form-input" id="new-agent-domain" type="number" value="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" id="add-agent-cancel">Cancel</button>
                <button class="btn btn-accent" id="add-agent-confirm">Add</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/icons.js"></script>
    <script src="js/ws.js"></script>
    <script src="js/map.js"></script>
    <script src="js/agents.js"></script>
    <script src="js/sensors.js"></script>
    <script src="js/accuracy.js"></script>
    <script src="js/scenario.js"></script>
    <script src="js/orchestrator.js"></script>
    <script src="js/sim_control.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
