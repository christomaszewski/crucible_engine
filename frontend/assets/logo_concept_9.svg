<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" fill="none">
  <!-- CRUCIBLE — crucible tilted right so opening faces left, forming a C shape -->
  <defs>
    <linearGradient id="m9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="s9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="g9"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="g9b"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <style>
    .lt9 { fill: #C8CCD2; font-family: 'Courier New', monospace; font-size: 78px; font-weight: 700; }
  </style>

  <!-- C — crucible tilted clockwise ~30deg, opening faces left like a C -->
  <g transform="translate(52, 8)">
    <g transform="rotate(30, 44, 52)">
      <!-- Vessel body -->
      <path d="M12,18 L5,68 Q5,88 26,88 L62,88 Q83,88 83,68 L76,18"
            stroke="#9E9E9E" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Top lip left -->
      <path d="M12,18 L5,10" stroke="#9E9E9E" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Top lip right -->
      <path d="M76,18 L83,10" stroke="#9E9E9E" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Molten contents -->
      <path d="M76,28 Q44,48 12,36 L14,68 Q14,82 30,82 L58,82 Q74,82 74,68 Z"
            fill="url(#m9)" opacity="0.85"/>
      <!-- Inner glow -->
      <ellipse cx="44" cy="58" rx="22" ry="14" fill="#FFD54F" opacity="0.25" filter="url(#g9)"/>
    </g>

    <!-- Pour stream — spilling from the left lip downward -->
    <path d="M-6,22 C-12,42 -14,62 -8,82 C-2,98 8,108 22,112"
          stroke="url(#s9)" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Stream glow -->
    <path d="M-6,22 C-12,42 -14,62 -8,82 C-2,98 8,108 22,112"
          stroke="#FF9800" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.12" filter="url(#g9b)"/>
    <!-- Drip -->
    <ellipse cx="22" cy="114" rx="12" ry="4" fill="#E65100" opacity="0.5"/>
  </g>

  <!-- RUCIBLE -->
  <text x="120" y="92" class="lt9">RUCIBLE</text>

  <!-- Subtle underline -->
  <line x1="46" y1="110" x2="620" y2="110" stroke="#E65100" stroke-width="1.5" opacity="0.2"/>
</svg>
