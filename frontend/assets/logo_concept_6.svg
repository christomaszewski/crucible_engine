<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" fill="none">
  <!-- CRUCIBLE — C as pouring crucible, warm orange/gold palette, dark bg -->
  <defs>
    <linearGradient id="molten6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="stream6" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="60%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="glow6s">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <style>
    .letter6 { fill: #C8CCD2; font-family: 'Courier New', monospace; font-size: 80px; font-weight: 700; }
  </style>

  <!-- Background strip for contrast -->
  <rect x="0" y="0" width="700" height="130" rx="8" fill="#0D0F12"/>

  <!-- C as crucible — more dramatic tilt, thicker pour -->
  <g transform="translate(12, 4)">
    <!-- Crucible body tilted -->
    <g transform="rotate(-30, 48, 55)">
      <!-- Thick vessel walls — rough/industrial feel -->
      <path d="M14,20 L6,70 Q6,92 30,92 L66,92 Q90,92 90,70 L82,20"
            stroke="#9E9E9E" stroke-width="7" fill="#2A2A2A" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Rim highlight -->
      <path d="M14,20 L82,20" stroke="#BDBDBD" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Left lip -->
      <path d="M14,20 L6,10" stroke="#9E9E9E" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Right lip / pour spout -->
      <path d="M82,20 L90,10" stroke="#BDBDBD" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Molten mass inside — glowing hot -->
      <path d="M14,38 Q48,52 82,28 L80,70 Q80,86 62,86 L34,86 Q14,86 14,70 Z"
            fill="url(#molten6)" opacity="0.9"/>
      <!-- Inner glow -->
      <ellipse cx="48" cy="60" rx="26" ry="16" fill="#FFD54F" opacity="0.3" filter="url(#glow6)"/>
    </g>

    <!-- Pour stream — thick, viscous molten flow -->
    <path d="M88,8 C92,30 88,55 92,80 C95,100 104,112 116,118"
          stroke="url(#stream6)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.95"/>
    <!-- Stream glow -->
    <path d="M88,8 C92,30 88,55 92,80 C95,100 104,112 116,118"
          stroke="#FF9800" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.12" filter="url(#glow6)"/>
    <!-- Thin trailing drip -->
    <path d="M90,10 C93,24 89,42 91,58"
          stroke="#FFD54F" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- Splash pool -->
    <ellipse cx="116" cy="120" rx="16" ry="5" fill="#E65100" opacity="0.6"/>
    <ellipse cx="116" cy="120" rx="28" ry="8" fill="#FF9800" opacity="0.1" filter="url(#glow6)"/>
  </g>

  <!-- RUCIBLE text -->
  <text x="132" y="96" class="letter6">RUCIBLE</text>
</svg>
