<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- CRUCIBLE icon — crucible held by robotic arms, network nodes in molten contents -->
  <defs>
    <linearGradient id="i_molten" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="40%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="i_rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="50%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
    <linearGradient id="i_armL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90A4AE"/>
      <stop offset="50%" stop-color="#607D8B"/>
      <stop offset="100%" stop-color="#455A64"/>
    </linearGradient>
    <linearGradient id="i_armR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90A4AE"/>
      <stop offset="50%" stop-color="#607D8B"/>
      <stop offset="100%" stop-color="#455A64"/>
    </linearGradient>
    <linearGradient id="i_vessel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <filter id="i_glowBig">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="i_glowMed">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="i_innerGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="i_shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="i_vesselClip">
      <path d="M60,58 Q65,54 100,54 Q135,54 140,58 L128,140 Q126,160 100,160 Q74,160 72,140 Z"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect width="200" height="200" rx="28" fill="#1A1D23"/>

  <g filter="url(#i_shadow)">

    <!-- Left robotic arm -->
    <g>
      <path d="M52,64 C36,82 28,104 30,120" stroke="url(#i_armL)" stroke-width="11" fill="none" stroke-linecap="round"/>
      <path d="M30,120 C32,138 42,152 58,162" stroke="url(#i_armL)" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M58,162 C68,168 78,172 88,174" stroke="url(#i_armL)" stroke-width="9" fill="none" stroke-linecap="round"/>
      <!-- Shoulder -->
      <circle cx="52" cy="64" r="7" fill="#78909C" stroke="#90A4AE" stroke-width="2.5"/>
      <circle cx="52" cy="64" r="3" fill="#B0BEC5"/>
      <!-- Elbow -->
      <circle cx="30" cy="120" r="6" fill="#78909C" stroke="#90A4AE" stroke-width="2"/>
      <circle cx="30" cy="120" r="2.5" fill="#B0BEC5"/>
      <!-- Wrist -->
      <circle cx="58" cy="162" r="5" fill="#78909C" stroke="#90A4AE" stroke-width="2"/>
      <circle cx="58" cy="162" r="2" fill="#B0BEC5"/>
      <!-- Bottom joint -->
      <circle cx="88" cy="174" r="7" fill="#607D8B" stroke="#90A4AE" stroke-width="2.5"/>
      <circle cx="88" cy="174" r="3" fill="#CFD8DC"/>
    </g>

    <!-- Right robotic arm -->
    <g>
      <path d="M148,64 C164,82 172,104 170,120" stroke="url(#i_armR)" stroke-width="11" fill="none" stroke-linecap="round"/>
      <path d="M170,120 C168,138 158,152 142,162" stroke="url(#i_armR)" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M142,162 C132,168 122,172 112,174" stroke="url(#i_armR)" stroke-width="9" fill="none" stroke-linecap="round"/>
      <!-- Shoulder -->
      <circle cx="148" cy="64" r="7" fill="#78909C" stroke="#90A4AE" stroke-width="2.5"/>
      <circle cx="148" cy="64" r="3" fill="#B0BEC5"/>
      <!-- Elbow -->
      <circle cx="170" cy="120" r="6" fill="#78909C" stroke="#90A4AE" stroke-width="2"/>
      <circle cx="170" cy="120" r="2.5" fill="#B0BEC5"/>
      <!-- Wrist -->
      <circle cx="142" cy="162" r="5" fill="#78909C" stroke="#90A4AE" stroke-width="2"/>
      <circle cx="142" cy="162" r="2" fill="#B0BEC5"/>
      <!-- Bottom joint -->
      <circle cx="112" cy="174" r="7" fill="#607D8B" stroke="#90A4AE" stroke-width="2.5"/>
      <circle cx="112" cy="174" r="3" fill="#CFD8DC"/>
    </g>

    <!-- Crucible vessel -->
    <path d="M60,58 Q65,54 100,54 Q135,54 140,58 L128,140 Q126,160 100,160 Q74,160 72,140 Z"
          fill="url(#i_vessel)" stroke="#78909C" stroke-width="3.5"/>

    <!-- Rim -->
    <ellipse cx="100" cy="56" rx="44" ry="11" fill="url(#i_rim)" stroke="#90A4AE" stroke-width="2"/>
    <ellipse cx="100" cy="54" rx="36" ry="6" fill="none" stroke="#B0BEC5" stroke-width="1" opacity="0.5"/>

    <!-- Molten contents -->
    <g clip-path="url(#i_vesselClip)">
      <rect x="58" y="46" width="84" height="118" fill="url(#i_molten)" opacity="0.9"/>
      <!-- Surface -->
      <ellipse cx="100" cy="58" rx="38" ry="12" fill="#FFD54F" opacity="0.6"/>
      <!-- Deep glow -->
      <ellipse cx="100" cy="90" rx="30" ry="32" fill="#FF9800" opacity="0.15" filter="url(#i_innerGlow)"/>

      <!-- Network nodes -->
      <g filter="url(#i_glowMed)">
        <circle cx="86" cy="76" r="4" fill="#FFD54F" opacity="0.95"/>
        <circle cx="116" cy="80" r="3.5" fill="#FFD54F" opacity="0.9"/>
        <circle cx="96" cy="96" r="4" fill="#FFCC02" opacity="0.9"/>
        <circle cx="112" cy="106" r="3.2" fill="#FFB300" opacity="0.85"/>
        <circle cx="82" cy="110" r="3" fill="#FFB300" opacity="0.8"/>
        <circle cx="100" cy="124" r="3.5" fill="#FF9800" opacity="0.85"/>
        <circle cx="88" cy="138" r="3" fill="#E65100" opacity="0.7"/>
        <circle cx="112" cy="134" r="2.8" fill="#E65100" opacity="0.7"/>
      </g>

      <!-- Network connections -->
      <g stroke="#FFD54F" stroke-width="1.2" opacity="0.35">
        <line x1="86" y1="76" x2="116" y2="80"/>
        <line x1="86" y1="76" x2="96" y2="96"/>
        <line x1="116" y1="80" x2="112" y2="106"/>
        <line x1="116" y1="80" x2="96" y2="96"/>
        <line x1="96" y1="96" x2="82" y2="110"/>
        <line x1="96" y1="96" x2="112" y2="106"/>
        <line x1="112" y1="106" x2="100" y2="124"/>
        <line x1="82" y1="110" x2="100" y2="124"/>
        <line x1="82" y1="110" x2="88" y2="138"/>
        <line x1="100" y1="124" x2="88" y2="138"/>
        <line x1="100" y1="124" x2="112" y2="134"/>
      </g>
    </g>

    <!-- Ambient glow -->
    <ellipse cx="100" cy="56" rx="48" ry="16" fill="#FF9800" opacity="0.12" filter="url(#i_glowBig)"/>

  </g>
</svg>
