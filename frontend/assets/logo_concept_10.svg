<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 140" fill="none">
  <!-- CRUCIBLE — crucible tilted right, C-shape, dark bg, heavy industrial -->
  <defs>
    <linearGradient id="m10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="40%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="s10" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="60%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <filter id="g10"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="g10s"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <style>
    .lt10 { fill: #D0D4DA; font-family: 'Courier New', monospace; font-size: 80px; font-weight: 700; }
  </style>

  <!-- Dark background -->
  <rect width="700" height="140" rx="8" fill="#0D0F12"/>

  <!-- C — crucible tilted clockwise, wide open left = C shape -->
  <g transform="translate(56, 6)">
    <g transform="rotate(35, 46, 54)">
      <!-- Heavy vessel walls -->
      <path d="M10,16 L2,72 Q2,96 28,96 L64,96 Q90,96 90,72 L82,16"
            stroke="#888" stroke-width="7" fill="#1A1D22" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Rim -->
      <path d="M10,16 L82,16" stroke="#AAA" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Left lip (now the pour spout after rotation) -->
      <path d="M10,16 L2,6" stroke="#AAA" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Right lip -->
      <path d="M82,16 L90,6" stroke="#888" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Molten fill — higher on right (tilted), spilling from left -->
      <path d="M82,24 Q46,50 10,32 L12,72 Q12,88 32,88 L60,88 Q80,88 80,72 Z"
            fill="url(#m10)" opacity="0.9"/>
      <!-- Hot glow -->
      <ellipse cx="46" cy="60" rx="28" ry="16" fill="#FFD54F" opacity="0.2" filter="url(#g10)"/>
    </g>

    <!-- Pour stream from left lip — cascading down-left then curving down -->
    <path d="M-10,18 C-18,40 -20,62 -14,84 C-8,102 4,116 24,124"
          stroke="url(#s10)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Glow -->
    <path d="M-10,18 C-18,40 -20,62 -14,84 C-8,102 4,116 24,124"
          stroke="#FF9800" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.1" filter="url(#g10)"/>
    <!-- Thin secondary drip -->
    <path d="M-8,22 C-14,38 -16,54 -12,68"
          stroke="#FFD54F" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>

    <!-- Pool -->
    <ellipse cx="24" cy="126" rx="16" ry="5" fill="#BF360C" opacity="0.55"/>
    <ellipse cx="24" cy="126" rx="28" ry="8" fill="#FF9800" opacity="0.08" filter="url(#g10)"/>
  </g>

  <!-- RUCIBLE -->
  <text x="130" y="98" class="lt10">RUCIBLE</text>
</svg>
