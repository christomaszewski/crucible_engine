<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" fill="none">
  <!-- CRUCIBLE logo — standalone crucible icon above, text below -->
  <style>
    .text { fill: #E0E0E0; font-family: 'Courier New', monospace; font-size: 48px; font-weight: 700; letter-spacing: 8px; }
    .sub { fill: #888; font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 4px; }
  </style>

  <!-- Crucible icon centered above -->
  <g transform="translate(252, 2)">
    <!-- Vessel -->
    <path d="M10,30 L2,75 Q2,95 25,95 L75,95 Q98,95 98,75 L90,30"
          stroke="#4FC3F7" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left handle -->
    <path d="M10,30 L2,22" stroke="#4FC3F7" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right lip / pour spout -->
    <path d="M90,30 L98,22" stroke="#4FC3F7" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Molten surface -->
    <path d="M14,48 Q50,60 86,48 L82,75 Q82,88 68,88 L32,88 Q18,88 18,75 Z"
          fill="#4FC3F7" opacity="0.3"/>
    <!-- Bright core -->
    <ellipse cx="50" cy="68" rx="24" ry="12" fill="#4FC3F7" opacity="0.15"/>
    <!-- Rising heat lines -->
    <path d="M35,25 Q32,15 35,5" stroke="#4FC3F7" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M50,22 Q47,10 50,0" stroke="#4FC3F7" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M65,25 Q68,15 65,5" stroke="#4FC3F7" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="300" y="128" text-anchor="middle" class="text">CRUCIBLE</text>
</svg>
