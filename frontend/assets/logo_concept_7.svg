<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none">
  <!-- CRUCIBLE — square icon version, pouring crucible with agent nodes in the stream -->
  <defs>
    <linearGradient id="molten7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="stream7" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="glow7s">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="220" height="220" rx="28" fill="#0D0F12"/>

  <!-- Crucible — tilted, pouring down-right -->
  <g transform="translate(20, 15)">
    <g transform="rotate(-35, 55, 55)">
      <!-- Vessel -->
      <path d="M15,25 L5,80 Q5,105 35,105 L75,105 Q105,105 105,80 L95,25"
            stroke="#888" stroke-width="6" fill="#1E2028" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Rim -->
      <path d="M15,25 L95,25" stroke="#AAA" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Lips -->
      <path d="M15,25 L7,15" stroke="#888" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M95,25 L103,15" stroke="#AAA" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Molten inside -->
      <path d="M15,45 Q55,60 95,35 L92,80 Q92,98 72,98 L38,98 Q18,98 18,80 Z"
            fill="url(#molten7)" opacity="0.85"/>
      <!-- Inner glow -->
      <ellipse cx="55" cy="70" rx="30" ry="18" fill="#FFD54F" opacity="0.25" filter="url(#glow7)"/>
    </g>

    <!-- Pour stream — curves down to bottom right -->
    <path d="M108,18 C112,50 105,85 115,120 C122,148 145,168 165,178"
          stroke="url(#stream7)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Stream glow -->
    <path d="M108,18 C112,50 105,85 115,120 C122,148 145,168 165,178"
          stroke="#FF9800" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.1" filter="url(#glow7)"/>

    <!-- Agent nodes emerging from the pour — being forged in the crucible -->
    <circle cx="110" cy="62" r="6" fill="#FFD54F" opacity="0.9"/>
    <circle cx="112" cy="105" r="6" fill="#FF9800" opacity="0.9"/>
    <circle cx="130" cy="145" r="6" fill="#E65100" opacity="0.9"/>

    <!-- Connection lines between agents -->
    <line x1="110" y1="62" x2="112" y2="105" stroke="#FFD54F" stroke-width="1" opacity="0.3"/>
    <line x1="112" y1="105" x2="130" y2="145" stroke="#FF9800" stroke-width="1" opacity="0.3"/>

    <!-- Pool/splash -->
    <ellipse cx="165" cy="182" rx="18" ry="6" fill="#E65100" opacity="0.45"/>
    <ellipse cx="165" cy="182" rx="30" ry="10" fill="#FF9800" opacity="0.08" filter="url(#glow7)"/>
  </g>
</svg>
