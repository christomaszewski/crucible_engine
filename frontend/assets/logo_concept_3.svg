<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" fill="none">
  <!-- CRUCIBLE logo — minimal, the U morphs into a crucible inline -->
  <style>
    .letter { fill: #C8D0D8; font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace; font-size: 72px; font-weight: 600; }
    .bright { fill: #4FC3F7; }
  </style>

  <!-- CR -->
  <text x="30" y="84" class="letter">CR</text>

  <!-- U as minimalist crucible — geometric, angular -->
  <g transform="translate(148, 16)">
    <!-- Angular vessel: trapezoid shape tapering down -->
    <path d="M4,16 L10,72 Q10,78 16,78 L50,78 Q56,78 56,72 L62,16"
          stroke="#4FC3F7" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left ear -->
    <path d="M4,16 L0,10" stroke="#4FC3F7" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right ear -->
    <path d="M62,16 L66,10" stroke="#4FC3F7" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Liquid level — flat top with slight meniscus -->
    <path d="M12,38 Q33,44 54,38 L52,72 Q52,74 46,74 L20,74 Q14,74 14,72 Z"
          fill="#4FC3F7" opacity="0.35"/>
  </g>

  <!-- CIBLE -->
  <text x="218" y="84" class="letter">CIBLE</text>

  <!-- Tagline -->
  <text x="30" y="108" fill="#667" font-family="'Courier New', monospace" font-size="11" letter-spacing="3px">MULTI-AGENT SIMULATION FRAMEWORK</text>
</svg>
